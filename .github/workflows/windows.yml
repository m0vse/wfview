name: Windows x64 build

permissions:
  contents: write

on: 
  push:
    branches: [ master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout wfview
        uses: actions/checkout@v4
        with:
          path: wfview
          fetch-depth: 0

      - name: Cache dependencies
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: |
            portaudio
            opus
            hidapi
            rtaudio
            r8brain-free-src
            eigen
            qcustomplot
          key: windows-deps-${{ hashFiles('wfview/wfview.pro') }}

      - name: Checkout dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth=1 https://github.com/PortAudio/portaudio.git portaudio
          git clone --depth=1 https://github.com/xiph/opus.git opus
          git clone --depth=1 https://github.com/libusb/hidapi.git hidapi
          git clone --depth=1 https://github.com/thestk/rtaudio.git rtaudio
          git clone --depth=1 https://github.com/avaneev/r8brain-free-src.git r8brain-free-src
          git clone --depth=1 --branch 5.0.1 https://gitlab.com/libeigen/eigen.git eigen
      - name: Download QCustomPlot
        shell: bash
        run: |
          mkdir -p qcustomplot
          curl -L "https://www.qcustomplot.com/release/2.1.1/QCustomPlot.tar.gz" \
            -o qcustomplot.tar.gz
          tar -xzf qcustomplot.tar.gz -C qcustomplot --strip-components=1
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.1
          cache: true
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtserialport qtwebsockets qtmultimedia
          tools: tools_ifw

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep 'WFVIEW_VERSION' wfview/wfview.pro | grep -oE '[0-9]+\.[0-9]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install jom
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: choco install jom -y
          
      - name: Write QCustomPlot pro file
        shell: bash
        run: |
          mkdir -p qcustomplot/x64

          cat > qcustomplot/qcustomplot-sharedlib.pro << 'EOF'
          TEMPLATE = lib
          TARGET = qcustomplot2
          DESTDIR = x64
          QT += widgets printsupport
          CONFIG += release shared
          DEFINES += QCUSTOMPLOT_COMPILE_LIBRARY
          SOURCES += qcustomplot.cpp
          HEADERS += qcustomplot.h
          EOF

      - name: Build QCustomPlot
        shell: cmd
        working-directory: ${{ github.workspace }}\qcustomplot
        run: |
          qmake qcustomplot-sharedlib.pro CONFIG+=release
          jom -j %NUMBER_OF_PROCESSORS%

      - name: Build PortAudio
        shell: cmd
        working-directory: ${{ github.workspace }}\portaudio
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DPA_BUILD_SHARED=ON ^
            -DPA_BUILD_STATIC=OFF
          cmake --build build --config Release

          mkdir msvc\X64\Release
          copy build\Release\portaudio.dll msvc\X64\Release\portaudio_x64.dll
          copy build\Release\portaudio.lib msvc\X64\Release\portaudio_x64.lib

      - name: Build HIDAPI
        shell: cmd
        working-directory: ${{ github.workspace }}\hidapi
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release

          mkdir windows\X64\Release
          copy build\src\windows\Release\hidapi.dll windows\X64\Release\
          copy build\src\windows\Release\hidapi.lib windows\X64\Release\
          
      - name: Build Opus
        shell: cmd
        working-directory: ${{ github.workspace }}\opus
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release

          mkdir win32\VS2015\x64\ReleaseDLL
          copy build\Release\opus.dll win32\VS2015\x64\ReleaseDLL\opus-0.dll
          copy build\Release\opus.lib win32\VS2015\x64\ReleaseDLL\opus.lib
          
      - name: Build wfview
        shell: cmd
        working-directory: wfview
        run: |
          qmake wfview.pro CONFIG+=release
          jom -j %NUMBER_OF_PROCESSORS%

      - name: Deploy Qt dependencies
        shell: cmd
        run: |
          windeployqt ^
            --release ^
            --no-system-d3d-compiler ^
            wfview\wfview-release\wfview.exe
            
      - name: Build Qt Installer
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $PKG_DIR = "installer\packages\org.wfview.wfview"

          New-Item -ItemType Directory -Force -Path "installer\config"
          New-Item -ItemType Directory -Force -Path "$PKG_DIR\data"
          New-Item -ItemType Directory -Force -Path "$PKG_DIR\meta"

          # Copy app files into package data
          Copy-Item -Recurse -Force "wfview\wfview-release\*" "$PKG_DIR\data\"

          # config.xml
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Installer>
            <Name>wfview</Name>
            <Version>$VERSION</Version>
            <Title>wfview</Title>
            <Publisher>wfview</Publisher>
            <StartMenuDir>wfview</StartMenuDir>
            <TargetDir>@ApplicationsDir@/wfview</TargetDir>
            <MaintenanceToolName>wfviewMaintenanceTool</MaintenanceToolName>
          </Installer>
          "@ | Set-Content "installer\config\config.xml"

          # package.xml
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Package>
            <DisplayName>wfview</DisplayName>
            <Description>Open Source interface for Icom transceivers</Description>
            <Version>$VERSION</Version>
            <ReleaseDate>$(Get-Date -Format 'yyyy-MM-dd')</ReleaseDate>
            <Default>true</Default>
            <Script>installscript.qs</Script>
          </Package>
          "@ | Set-Content "$PKG_DIR\meta\package.xml"

          # installscript.qs
          @"
          function Component() {}
          Component.prototype.createOperations = function() {
            component.createOperations();
            component.addOperation("CreateShortcut",
              "@TargetDir@/wfview.exe",
              "@StartMenuDir@/wfview.lnk",
              "workingDirectory=@TargetDir@");
          }
          "@ | Set-Content "$PKG_DIR\meta\installscript.qs"

          # Build installer
          binarycreator `
            --offline-only `
            -c installer\config\config.xml `
            -p installer\packages `
            "wfview-$VERSION-windows-x64-setup.exe"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: wfview-windows-installer
          path: wfview-${{ steps.version.outputs.version }}-windows-x64-setup.exe
